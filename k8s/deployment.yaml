apiVersion: apps/v1
kind: Deployment
metadata:
  name: fanly
  namespace: fanly
  labels:
    app.kubernetes.io/name: fanly
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fanly
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fanly
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/fanly:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
